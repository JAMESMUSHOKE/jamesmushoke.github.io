<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soko la Pioneer | James Mushoke - Web Developer & Portfolio</title>
<meta name="description" content="Soko la Pioneer ni jukwaa la James Mushoke. Tunauza bidhaa na huduma za Web Development. Karibu uone portfolio yetu.">
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: Arial; background: #f5f5f5; margin: 0; padding: 20px; text-align: center; }
    h1 { color: #6B46C1; }
    .btn { background: #6B46C1; color: white; padding: 12px 30px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 10px; }
    .btn:hover { background: #553C9A; }
    .products { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
    .card { background: white; border-radius: 10px; padding: 15px; width: 250px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
    .price { color: #6B46C1; font-weight: bold; font-size: 18px; }
  </style>
</head>
<body>
  <h1>KARIBU SOKO LA PIONEER</h1>
  <p>Mahali pa Wapainia Kununua na Kuuza kwa Pi</p>
  <button class="btn" onclick="login()">Ingia na Pi Wallet</button>
  <div class="products">
    <div class="card">
      <img src="https://via.placeholder.com/250x150.png?text=Simu" alt="Simu">
      <h3>Simu ya Mkononi</h3>
      <p class="price" data-dollar="500"></p>
      <button class="btn" onclick="pay(50, 'Simu')">Nunua Sasa</button>
    </div>
    <div class="card">
      <img src="https://via.placeholder.com/250x150.png?text=Mafuta" alt="Mafuta">
      <h3>Mafuta ya Kupikia 5L</h3>
      <p class="price" data-dollar="500"></p>
      <button class="btn" onclick="pay(5, 'Mafuta')">Nunua Sasa</button>
    </div>
    <div class="card">
      <img src="https://via.placeholder.com/250x150.png?text=Nguo" alt="Nguo">
      <h3>Nguo za Watoto</h3>
      <p class="price" data-dollar="500"></p>
<button class="btn" onclick="payWithPi(500, 'Simu ya Mkononi')">Nunua Sasa kwa Pi</button>
      <img src="images/house1.jpg">
    </div>
<img src="./house1.jpg">
<img src="./car1.jpg">
<img src="./men's%20clothing.jpg">
  </div>
  <script>
    Pi.init({ version: "2.0", sandbox: true });
    async function login() {
      const scopes = ['username', 'payments'];
      const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
      alert("Karibu " + auth.user.username);
    }
    async function pay(amount, item) {
      const paymentData = { amount: amount, memo: "Kununua " + item, metadata: { item: item } };
      const callbacks = {
        onReadyForServerApproval: function(paymentId) { alert("Tuma paymentId kwa server: " + paymentId); },
        onReadyForServerCompletion: function(paymentId, txid) { alert("Malipo yamefaulu!"); },
        onCancel: function(paymentId) { alert("Umekanseli"); },
        onError: function(error) { alert("Kosa: " + error); }
      };
      Pi.createPayment(paymentData, callbacks);
    }
    function onIncompletePaymentFound(payment) { console.log(payment); }
  </script>
</body><script>
// GCV Calculator - 1 Pi = $314,159
const GCV = 314159;

function formatPi(priceInDollar) {
    let pi = priceInDollar / GCV;
    return pi.toFixed(6) + " Pi";
}

// Mfano:<!-- Simu -->
<p class="price" data-dollar="300"></p>

<!-- Gari -->
<p class="price" data-dollar="15000"></p>

<!-- Nyumba -->
<p class="price" data-dollar="60000"></p>

<!-- Nguo za wanaume -->
<p class="price" data-dollar="50"></p>
document.addEventListener("DOMContentLoaded", function() {
    let prices = document.querySelectorAll(".price");
    prices.forEach(function(p) {
        let dollar = parseFloat(p.getAttribute("data-dollar"));
        if(dollar){
            p.innerHTML = formatPi(dollar) + " <br><small>≈ $" + dollar.toLocaleString() + "</small>";
        }
    });
});
</script>
</html>

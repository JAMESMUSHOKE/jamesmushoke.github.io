<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIONEER MARKET</title>
    <style>
        body { font-family: Arial; background: #f0f0f0; padding: 15px; text-align: center; }
        .product { background: white; border-radius: 15px; padding: 15px; max-width: 400px; margin: 20px auto; }
        .product img { width: 100%; border-radius: 10px; height: 200px; object-fit: cover; }
        .price { font-size: 18px; color: #FF5722; font-weight: bold; }
        .btn { background: #6B46C1; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; margin-top: 10px; font-size: 16px; }
    </style>
</head>
<body>
    <h1 style="color:#6B46C1;">PIONEER MARKET</h1>

    <div class="product">
        <img src="watch.jpg" alt="Watch">
        <h3>Wrist Watch</h3>
        <p class="price">0.000159 Pi ≈ $50</p>
        <button class="btn">Buy with Pi</button>
    </div>

</body>
</html>

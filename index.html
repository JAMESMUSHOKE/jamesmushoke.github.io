<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOKO LA PIONEER - GCV Calculator</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; background: #f0f0f0; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; max-width: 400px; margin: 20px auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #6B46C1; }
        .price { font-size: 22px; color: #6B46C1; font-weight: bold; margin: 15px 0; }
        .btn { background: #6B46C1; color: white; border: none; padding: 10px 20px; border-radius: 8px; margin: 5px; cursor: pointer; font-size: 16px; }
        .btn:hover { background: #553C9A; }
    </style>
</head>
<body>
    <div style="text-align:center; margin-bottom: 10px;">
        <button class="btn" onclick="setLanguage('sw')">Kiswahili</button>
        <button class="btn" onclick="setLanguage('en')">English</button>
    </div>

    <div class="container">
        <h1>SOKO LA PIONEER</h1>
        <p>GCV Calculator - 1 Pi = $314,159</p>
        
        <div class="price" data-dollar="300"></div>
        <div class="price" data-dollar="15000"></div>
        <div class="price" data-dollar="60000"></div>
        <div class="price" data-dollar="50"></div>
    </div>

<script>
const GCV = 314159;
function formatPi(priceInDollar) { 
    let pi = priceInDollar / GCV; 
    return pi.toFixed(6) + " Pi"; 
}
document.addEventListener("DOMContentLoaded", function() { 
    let prices = document.querySelectorAll(".price");
    prices.forEach(function(p) { 
        let dollar = parseFloat(p.getAttribute("data-dollar"));
        if(dollar){ 
            p.innerHTML = formatPi(dollar) + "<br>≈ $" + dollar.toLocaleString(); 
        }
    });
});
function setLanguage(lang){ 
    alert("Lugha itabadilika hivi karibuni: " + lang) 
}
Pi.init({ version: "2.0", sandbox: true });
</script>
</body>
</html>

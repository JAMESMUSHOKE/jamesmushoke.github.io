<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <title>SOKO LA PIONEER</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    button { background: #6a0dad; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 16px; margin: 10px; cursor: pointer; }
  </style>
</head>
<body>

  <h1>Earbuds Wireless</h1>
  <p>Bei: 2.0 π</p>
  
  <button onclick="login()">LOGIN WITH PI</button>
  <button onclick="buyWithPi(2.0, 'Earbuds Wireless')">BUY WITH PI</button>
  
  <p style="font-size: 11px; color: #666;">
    By continuing you authorize a Pi payment via the Pi SDK. Server-side approval required on Mainnet.
  </p>

<script>
  // 1. Anzisha Pi SDK
  Pi.init({ version: "2.0", clientId: "r-VpJRLIt_Dg6zUIOZDUoWDeW7yEEas69ok", sandbox: true });

  // 2. Function ya Login
  async function login() {
    const scopes = ['username', 'payments'];
    const authResult = await Pi.authenticate(scopes, onIncompletePaymentFound);
    alert("Karibu " + authResult.user.username);
  }

  function onIncompletePaymentFound(payment) {
    console.log(payment);
  }

  // 3. Function ya Kulipa
  function buyWithPi(amount, productName) {
    const paymentData = { amount: amount, memo: "Kununua: " + productName, metadata: { product: productName } };
    const callbacks = {
      
      // HII NDO TUNAIBADILI ILI IPITE
      onReadyForServerApproval: function(paymentId) { 
        console.log("Inaruka hatua ya server...");
        Pi.approvePayment(paymentId); // <-- Mstari huu ndio ufunguo
      },

      onReadyForServerCompletion: function(paymentId, txid) { 
        alert("Hongera! Umenunua " + productName + " kwa mafanikio");
      },
      onCancel: function(paymentId) { 
        alert("Umefuta malipo");
      },
      onError: function(error) { 
        alert("Kuna hitilafu: " + error);
      }
    };
    Pi.createPayment(paymentData, callbacks);
  }

      onReadyForServerApproval: function(paymentId) { alert("Tunasubiri uthibitisho..."); },

      onError: function(error) { alert("Kuna hitilafu: " + error); }

  }
</script>

</body>
</html>

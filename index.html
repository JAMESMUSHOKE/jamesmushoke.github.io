<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <title>SOKO LA PIONEER</title>
  
  <!-- 1. HII LAZIMA IWE HAPA JUU -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  
  <style>
    body { text-align: center; padding: 20px; font-family: Arial; }
    button { background: #6a0dad; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 16px; margin: 10px; cursor: pointer; }
  </style>
</head>
<body>

  <h1>Earbuds Wireless</h1>
  <p>Bei: 2.0 π</p>
  
  <!-- 2. HAPA NDO BUTTON -->
  <button onclick="login()">LOGIN WITH PI</button>
  <button onclick="buyWithPi(2.0, 'Earbuds Wireless')">BUY WITH PI</button>
  
  <p style="font-size: 11px;">By continuing you authorize a Pi payment via the Pi SDK.</p>

<!-- 3. HAPA CHINI NDO UBONGO -->
<script>
  // Anzisha Pi SDK na sandbox kwa majaribio
  Pi.init({ version: "2.0", clientId: "r-VpJRLIt_Dg6zUIOZDUoWDeW7yEEas69ok", sandbox: true });

  // FUNCTION YA LOGIN
  async function login() {
    try {
      const scopes = ['username', 'payments'];
      const authResult = await Pi.authenticate(scopes, onIncompletePaymentFound);
      alert("Karibu " + authResult.user.username);
    } catch (err) {
      alert("Login imeshindikana: " + err);
    }
    function buyWithPi(amount, productName) {
  const paymentData = { 
    amount: amount, 
    memo: "Kununua: " + productName, 
    metadata: { product: productName } 
  };
  const callbacks = {
    onReadyForServerApproval: (paymentId) => Pi.approvePayment(paymentId),
    onReadyForServerCompletion: (paymentId, txid) => alert("Hongera! Umenunua " + productName),
    onCancel: (paymentId) => alert("Umefuta malipo"),
    onError: (error) => alert("Kuna hitilafu: " + error)
  };
  Pi.createPayment(paymentData, callbacks);
}
</script>

</body>
</html>

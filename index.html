<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOKO LA PIONEER - Web3</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body { background: #0d0d1a; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
   .container { max-width: 500px; margin: auto; }
   .product-card { background: #1a1a2e; padding: 20px; border-radius: 15px; border: 1px solid #6a0dad; margin-bottom: 20px; text-align: center; }
    h1 { color: #a855f7; text-align: center; }
   .price { font-size: 20px; color: #fbbf24; font-weight: bold; }
    button { background: linear-gradient(90deg, #6a0dad, #a855f7); color: white; padding: 12px 25px; border: none; border-radius: 10px; font-size: 15px; margin: 5px; cursor: pointer; font-weight: bold; width: 90%; }
    select { padding: 8px; border-radius: 8px; background: #0d0d1a; color: white; border: 1px solid #6a0dad; float: right; }
    #history { background: #1a1a2e; padding: 15px; border-radius: 10px; margin-top: 20px; display: none; }
  </style>
</head>
<body>

  <div class="container">
    <select id="language-select" onchange="setLanguage(this.value)">
      <option value="en">English</option>
      <option value="sw">Kiswahili</option>
      <option value="zh">中文</option>
      <option value="es">Español</option>
    </select>
    <h1 id="store-title">SOKO LA PIONEER</h1>

    <!-- BIDHAA 1 -->
    <div class="product-card">
      <h2 id="p1-name">Earbuds Bila Waya</h2>
      <img src="https://placehold.co/200x200/6a0dad/ffffff?text=Earbuds" width="120" style="border-radius: 10px;">
      <p class="price" id="p1-price">Bei: 2.0 π ~ $628,318 GCV</p>
      <button onclick="buyWithPi(2.0, 'Earbuds Bila Waya')" id="p1-btn">NUNUA KWA PI</button>
    </div>

    <!-- BIDHAA 2 -->
    <div class="product-card">
      <h2 id="p2-name">Saa Mahiri</h2>
      <img src="https://placehold.co/200x200/6a0dad/ffffff?text=SmartWatch" width="120" style="border-radius: 10px;">
      <p class="price" id="p2-price">Bei: 5.0 π ~ $1,570,795 GCV</p>
      <button onclick="buyWithPi(5.0, 'Saa Mahiri')" id="p2-btn">NUNUA KWA PI</button>
    </div>

    <!-- BIDHAA 3 -->
    <div class="product-card">
      <h2 id="p3-name">Power Bank 20000mAh</h2>
      <img src="https://placehold.co/200x200/6a0dad/ffffff?text=PowerBank" width="120" style="border-radius: 10px;">
      <p class="price" id="p3-price">Bei: 3.0 π ~ $942,477 GCV</p>
      <button onclick="buyWithPi(3.0, 'Power Bank')" id="p3-btn">NUNUA KWA PI</button>
    </div>

    <button onclick="login()" id="login-btn">INGIA KWA PI</button>
    <button onclick="showHistory()" id="history-btn">HISTORIA YANGU</button>

    <div id="history">
      <h3 id="history-title">Historia ya Ununuzi</h3>
      <ul id="history-list"></ul>
    </div>
  </div>

<script>
  Pi.init({ version: "2.0", clientId: "r-VpJRLIt_Dg6zUIOZDUoWDeW7yEEas69ok", sandbox: false });
  let purchaseHistory = JSON.parse(localStorage.getItem('piHistory')) || [];

  const translations = {
    en: { store: "PIONEER MARKET", p1: "Wireless Earbuds", p2: "Smart Watch", p3: "Power Bank 20000mAh", price1: "Price: 2.0 π ~ $628,318 GCV", price2: "Price: 5.0 π ~ $1,570,795 GCV", price3: "Price: 3.0 π ~ $942,477 GCV", buy: "BUY WITH PI", login: "LOGIN WITH PI", history: "MY HISTORY", historyTitle: "Purchase History", success: "Success! You bought " },
    sw: { store: "SOKO LA PIONEER", p1: "Earbuds Bila Waya", p2: "Saa Mahiri", p3: "Power Bank 20000mAh", price1: "Bei: 2.0 π ~ $628,318 GCV", price2: "Bei: 5.0 π ~ $1,570,795 GCV", price3: "Bei: 3.0 π ~ $942,477 GCV", buy: "NUNUA KWA PI", login: "INGIA KWA PI", history: "HISTORIA YANGU", historyTitle: "Historia ya Ununuzi", success: "Hongera! Umenunua " }
  };

  function setLanguage(lang) {
    const t = translations[lang];
    document.getElementById('store-title').innerText = t.store;
    document.getElementById('p1-name').innerText = t.p1;
    document.getElementById('p2-name').innerText = t.p2;
    document.getElementById('p3-name').innerText = t.p3;
    document.getElementById('p1-price').innerText = t.price1;
    document.getElementById('p2-price').innerText = t.price2;
    document.getElementById('p3-price').innerText = t.price3;
    document.getElementById('login-btn').innerText = t.login;
    document.getElementById('history-btn').innerText = t.history;
    document.getElementById('history-title').innerText = t.historyTitle;
    document.querySelectorAll('[id$="-btn"]').forEach(btn => { if(btn.id!== 'login-btn' && btn.id!== 'history-btn') btn.innerText = t.buy; });
  }

  window.onload = function() {
    const userLang = navigator.language.slice(0,2);
    if(translations[userLang]) { document.getElementById('language-select').value = userLang; setLanguage(userLang); }
    else { setLanguage('sw'); }
    showHistory();
  }

  async function login() {
    const authResult = await Pi.authenticate(['username', 'payments'], onIncompletePaymentFound);
    alert(translations.sw.success + authResult.user.username);
  }

  function onIncompletePaymentFound(payment) { Pi.completePayment(payment.identifier, payment.transaction.txid); }

  function buyWithPi(amount, productName) {
    const paymentData = { amount: amount, memo: "Buy: " + productName, metadata: { product: productName } };
    const callbacks = {
      onReadyForServerApproval: (paymentId) => Pi.approvePayment(paymentId),
      onReadyForServerCompletion: (paymentId, txid) => {
        alert("Hongera! Umenunua " + productName);
        purchaseHistory.push({ product: productName, amount: amount, date: new Date().toLocaleString(), txid: txid });
        localStorage.setItem('piHistory', JSON.stringify(purchaseHistory));
        showHistory();
      },
      onCancel: () => alert("Umefuta malipo"),
      onError: (error) => alert("Hitilafu: " + error)
    };
    Pi.createPayment(paymentData, callbacks);
  }

  function showHistory() {
    document.getElementById('history').style.display = 'block';
    const list = document.getElementById('history-list');
    list.innerHTML = '';
    if(purchaseHistory.length === 0) { list.innerHTML = '<li>Hakuna ununuzi bado</li>'; }
    purchaseHistory.forEach(item => {
      list.innerHTML += `<li>${item.product} - ${item.amount} π - ${item.date}</li>`;
    });
  }
</script>

</body>
</html>
